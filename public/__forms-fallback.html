<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netlify Forms Anchor</title>
</head>
<body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="contact" />
        <input type="text" name="first-name" />
        <input type="text" name="last-name" />
        <input type="text" name="job-title" />
        <input type="text" name="company-name" />
        <input type="text" name="address-line-1" />
        <input type="text" name="address-line-2" />
        <input type="text" name="city" />
        <input type="text" name="state-region" />
        <input type="text" name="postal-code" />
        <input type="text" name="country" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <input type="radio" name="marketing-source" />
        <input type="text" name="subject" />
        <textarea name="message"></textarea>
    </form>

    <form name="request-a-quote" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
        <input type="hidden" name="form-name" value="request-a-quote" />
        <input type="text" name="first-name" />
        <input type="text" name="last-name" />
        <input type="text" name="job-title" />
        <input type="text" name="organization" />
        <input type="text" name="address-line-1" />
        <input type="text" name="address-line-2" />
        <input type="text" name="city" />
        <input type="text" name="state" />
        <input type="text" name="postal-code" />
        <input type="text" name="country" />
        <input type="email" name="email" />
        <input type="tel" name="phone" />
        <input type="radio" name="marketing-source" />
        <input type="text" name="project-interest" />
        <input type="radio" name="annual-budget" />
        <input type="file" name="engineering-assets" multiple />
    </form>
</body>
</html>
